- title: Energy, Data Centers & Physical Constraints
  type: challenge
  level: 3
  description: |-
    The AGI race is ultimately constrained by physics: energy, cooling, and chip fabrication. As training runs scale from gigawatt-hours to hundreds of gigawatt-hours, the physical infrastructure becomes as important as the algorithms.
  columns:
  - Challenge
  - Current State
  - Links
  items:
  - name: Gigawatt-scale data centers
    raw_name: '**Gigawatt-scale data centers**'
    description: |-
      Microsoft, Meta, Google, Amazon, and xAI are all building or planning 1-5 GW data centers. xAI's Memphis "Colossus" cluster: 100k H100s. Microsoft's $100B Stargate project with OpenAI.
    links_text: Industry announcements
  - name: Nuclear-powered AI
    raw_name: '**Nuclear-powered AI**'
    description: |-
      Microsoft restarted Three Mile Island Unit 1 for AI power. Amazon, Google, and Oracle securing nuclear power for data centers. SMR (Small Modular Reactor) partnerships proliferating.
    links:
    - label: News
      url: https://www.reuters.com/technology/
  - name: The Memory Wall
    raw_name: '**The Memory Wall**'
    description: |-
      Context window expansion (4K -> 128K -> 1M -> 10M tokens) functions as "working memory" for AGI. Llama 4 Scout: 10M tokens. Gemini 1.5: 2M. But attention scales quadratically -- memory-efficient architectures (Infini-Attention, Mamba, RWKV) are essential.
    links:
    - label: Reasoning Papers
      url: '#reasoning-scaling--architecture-papers'
    links_text: See [Reasoning Papers](#reasoning-scaling--architecture-papers)
  - name: Training cost trajectory
    raw_name: '**Training cost trajectory**'
    description: |-
      GPT-4: ~$100M. Llama 3 405B: ~$30M. DeepSeek-V3: $5.5M. Efficiency gains (MoE, distillation, FP8/FP4) are democratizing frontier training.
    links_text: Model technical reports
