section:
  title: Distributed Training Frameworks
  description: |-
    Training frontier models requires distributing computation across thousands of GPUs. These frameworks handle the parallelism, memory optimization, and communication needed to train models with billions (or trillions) of parameters.
  badges:
  - alt: DeepSpeed
    path: DeepSpeed-Microsoft-blue?style=flat-square
  - alt: Megatron
    path: Megatron-NVIDIA-76B900?style=flat-square
  - alt: Distributed
    path: Distributed-Multi--GPU-purple?style=flat-square
