      url: https://huggingface.co/jinaai/jina-embeddings-v3
  - name: bge-m3
    raw_name: bge-m3
    org: BAAI
    description: 'Multilingual (100 langs), multi-functionality: dense + sparse + ColBERT.'
    links:
    - label: HuggingFace
      url: https://huggingface.co/BAAI/bge-m3
  - name: gte-Qwen2-7B-instruct
    raw_name: gte-Qwen2-7B-instruct
    org: Alibaba
    description: LLM-based embedding, top MTEB, instruction-tuned, 32K context.
    links:
    - label: HuggingFace
      url: https://huggingface.co/Alibaba-NLP/gte-Qwen2-7B-instruct
