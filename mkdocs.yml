site_name: Awesome AGI, ASI, and Collective Intelligence
site_url: https://nellaivijay.github.io/awesome-agi-aci-asi/
site_description: >-
  The most comprehensive, curated collection of resources on Artificial General
  Intelligence (AGI), Artificial Superintelligence (ASI), and Collective Intelligence -- updated April 2026.
  Covers GPT 5.4, Gemini 3.1 Flash Live, Claude Opus 4.6, frontier models, JEPA architectures,
  AI agents, multi-agent systems, LLMs, RAG, fine-tuning, safety, alignment, research papers, development tools,
  and emerging security threats for builders and researchers shaping the future of intelligence.
site_author: nellaivijay
repo_url: https://github.com/nellaivijay/awesome-agi-aci-asi
repo_name: nellaivijay/awesome-agi-aci-asi
copyright: Copyright &copy; 2024-2026 nellaivijay

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - navigation.trail
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
      separator: '[\s\-\.\_]+'
  # - blog:
  #     blog_dir: blog
  #     post_date_format: long
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  # - social:
  #     cards_layout: default
  # - rss:
  #     match_path: ".*"
  #     date_from_meta:
  #       as_creation: date.created
  #       as_update: date.updated
  #     categories:
  #       - tags
  #     comments_path: "#__comments"
  #     image: https://nellaivijay.github.io/awesome-agi-aci-asi/assets/logo.png
  #     pretty_print: true
  #     length: 250
  - meta

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nellaivijay/awesome-agi-aci-asi
  generator: false

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - attr_list
  - md_in_html
  - meta
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Understand:
    - Understanding AI, AGI, and ASI: understand/ai-agi-asi.md
    - Collective Intelligence: understand/collective-intelligence.md
    - AGI Benchmarks & Evals: understand/benchmarks.md
    - ASI and Superintelligence Research: understand/asi-research.md
  - Build:
    - Frameworks and Platforms: build/frameworks.md
    - Agents: build/agents.md
    - Physical AI & Embodied Intelligence: build/physical-ai.md
    - Paper-to-Code Automation: build/paper-to-code.md
  - Infrastructure:
    - LLM Application Frameworks: infrastructure/llm-frameworks.md
    - RAG and Vector Databases: infrastructure/rag-vector-db.md
    - Data Infrastructure for AI at Scale: infrastructure/data-infra.md
    - LLM Fine-Tuning Techniques: infrastructure/fine-tuning.md
    - LLM Deployment and Serving: infrastructure/deployment.md
    - Distributed Training Frameworks: infrastructure/distributed-training.md
    - Compute, Hardware & Quantization: infrastructure/compute-hardware.md
    - Prompt Engineering: infrastructure/prompt-engineering.md
  - Safety & Governance:
    - Safety, Alignment and Governance: safety/safety-alignment.md
  - Research & Learn:
    - Papers, Blogs, Courses and Lectures: research/papers-blogs.md
    - Tutorials and Guides: research/tutorials.md
    - Top Conferences: research/conferences.md
  - Blog:
    - blog/index.md
  - Contributing:
    - Contributing: contributing.md
    - DevOps Guide: devops-guide.md
